services:
  claude-code:
    build:
      context: ./claude-code
      args:
        CLAUDE_CODE_VERSION: latest
    container_name: personal-assistant-claude
    restart: unless-stopped
    volumes:
      # Bind-mount host Claude credentials dir for OAuth tokens
      # Homelab: default ~/.claude works (run `claude login` on host first)
      # Windows: set CLAUDE_CONFIG_DIR=C:/Users/Dodo/.claude in .env
      - ${CLAUDE_CONFIG_DIR:-~/.claude}:/home/node/.claude
    environment:
      - NODE_OPTIONS=--max-old-space-size=4096
      - HOME=/home/node

  paperless-mcp:
    image: ghcr.io/baruchiro/paperless-mcp:latest
    container_name: personal-assistant-paperless-mcp
    restart: unless-stopped
    environment:
      - PAPERLESS_URL=${PAPERLESS_URL}
      - PAPERLESS_API_KEY=${PAPERLESS_API_TOKEN}

  checker-mcp:
    build:
      context: ./checker-mcp
    container_name: personal-assistant-checker-mcp
    restart: unless-stopped
    environment:
      - PAPERLESS_URL=${PAPERLESS_URL}
      - PAPERLESS_API_TOKEN=${PAPERLESS_API_TOKEN}
