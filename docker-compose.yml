services:
  claude-code:
    build:
      context: ./claude-code
      args:
        CLAUDE_CODE_VERSION: latest
    container_name: personal-assistant-claude
    restart: unless-stopped
    volumes:
      # Bind-mount host Claude credentials dir for OAuth tokens
      # Homelab: default ~/.claude works (run `claude login` on host first)
      # Windows: set CLAUDE_CONFIG_DIR=C:/Users/Dodo/.claude
      - ${CLAUDE_CONFIG_DIR:-~/.claude}:/home/node/.claude
    environment:
      - NODE_OPTIONS=--max-old-space-size=4096
      - HOME=/home/node
    networks:
      - assistant
    # No ports exposed — Remote Control uses outbound HTTPS only

  mock-paperless-tool:
    build:
      context: ./mock-tool
    container_name: personal-assistant-mock-paperless
    restart: unless-stopped
    networks:
      - assistant
    # Port 8000 exposed only within Docker network (not to host)

networks:
  assistant:
    driver: bridge
