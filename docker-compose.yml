services:
  claude-code:
    build:
      context: ./claude-code
      args:
        CLAUDE_CODE_VERSION: latest
    container_name: personal-assistant-claude
    restart: unless-stopped
    volumes:
      # Bind-mount host Claude credentials dir for OAuth tokens
      # Homelab: default ~/.claude works (run `claude login` on host first)
      # Windows: set CLAUDE_CONFIG_DIR=C:/Users/Dodo/.claude in .env
      - ${CLAUDE_CONFIG_DIR:-~/.claude}:/home/node/.claude
      # Downloaded invoices — check from host via ./data/downloads/
      - ${DOWNLOADS_DIR:-./data/downloads}:/workspace/downloads
    environment:
      - NODE_OPTIONS=--max-old-space-size=4096
      - HOME=/home/node
      # Telegram channel
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - TELEGRAM_STATE_DIR=/home/node/.claude/channels/telegram

  paperless-mcp:
    image: ghcr.io/baruchiro/paperless-mcp:latest
    container_name: personal-assistant-paperless-mcp
    restart: unless-stopped
    environment:
      - PAPERLESS_URL=${PAPERLESS_URL}
      - PAPERLESS_API_KEY=${PAPERLESS_API_TOKEN}

  checker-mcp:
    build:
      context: ./checker-mcp
    container_name: personal-assistant-checker-mcp
    restart: unless-stopped
    environment:
      - PAPERLESS_URL=${PAPERLESS_URL}
      - PAPERLESS_API_TOKEN=${PAPERLESS_API_TOKEN}

  gmail-mcp:
    image: ghcr.io/taylorwilsdon/google_workspace_mcp:latest
    container_name: personal-assistant-gmail-mcp
    restart: unless-stopped
    ports:
      # OAuth callback — Google redirects to localhost:8000/oauth2callback
      - "8000:8000"
    volumes:
      # OAuth tokens persist here — first call triggers auth flow
      - ${GMAIL_CREDS_DIR:-./data/gmail}:/app/store_creds
      # Mount Google OAuth client credentials (Desktop App type)
      - ${GMAIL_CLIENT_SECRET:-./data/gmail/client_secret.json}:/app/client_secret.json:ro
    environment:
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET}
      - GOOGLE_MCP_CREDENTIALS_DIR=/app/store_creds
      - TOOLS=gmail
    entrypoint: ["uv", "run", "main.py"]
    command: ["--transport", "streamable-http", "--tools", "gmail", "--read-only"]

  outlook-mcp:
    build:
      context: ./outlook-mcp
    container_name: personal-assistant-outlook-mcp
    restart: unless-stopped
    volumes:
      # Token cache persists here — device code auth runs at startup if needed
      - ${OUTLOOK_DATA_DIR:-./data/outlook}:/data
    environment:
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID:-}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID:-consumers}
      - TOKEN_CACHE_PATH=/data/token_cache.json
