services:
  claude-code:
    image: personal-assistant-claude-code:latest
    build:
      context: ./claude-code
      args:
        CLAUDE_CODE_VERSION: latest
    container_name: personal-assistant-claude
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "false"
    depends_on:
      paperless-mcp:
        condition: service_healthy
      checker-mcp:
        condition: service_healthy
      gmail-mcp:
        condition: service_healthy
      outlook-mcp:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "tmux has-session -t claude 2>/dev/null && curl -sf http://localhost:9465/health > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    ports:
      - "9465:9465"
      - "9466:9466"
    volumes:
      # Bind-mount host Claude credentials dir for OAuth tokens
      - ${PA_DATA_DIR:-/mnt/shared_configs/personal-assistant}/claude-config:/home/node/.claude
      # Downloaded invoices
      - ${PA_DATA_DIR:-/mnt/shared_configs/personal-assistant}/downloads:/workspace/downloads
      - ${PA_DATA_DIR:-/mnt/shared_configs/personal-assistant}/email-watcher:/data/email-watcher
      - ${PA_DATA_DIR:-/mnt/shared_configs/personal-assistant}/gdrive-watcher:/data/gdrive-watcher
    environment:
      - NODE_OPTIONS=--max-old-space-size=4096
      - HOME=/home/node
      # OpenTelemetry — Claude Code native telemetry
      - CLAUDE_CODE_ENABLE_TELEMETRY=1
      - OTEL_METRICS_EXPORTER=otlp
      - OTEL_LOGS_EXPORTER=otlp
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_ENDPOINT:-}
      - OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE=cumulative
      - OTEL_METRIC_EXPORT_INTERVAL=${OTEL_METRIC_INTERVAL:-10000}
      - OTEL_LOGS_EXPORT_INTERVAL=5000
      - OTEL_LOG_TOOL_DETAILS=1
      # Telegram channel
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - TELEGRAM_STATE_DIR=/home/node/.claude/channels/telegram
      # email-watcher channel
      - GMAIL_EMAIL=${GMAIL_EMAIL:-}
      - GMAIL_SEARCH_BASE=${GMAIL_SEARCH_BASE:-${GMAIL_SEARCH_QUERY:-}}
      - MAX_CATCHUP_EMAILS=${MAX_CATCHUP_EMAILS:-10}
      - GMAIL_MCP_URL=http://gmail-mcp:8000/mcp
      - OUTLOOK_MCP_URL=http://outlook-mcp:8002/mcp
      - OUTLOOK_ENABLED=${OUTLOOK_ENABLED:-true}
      - POLL_INTERVAL_MS=${POLL_INTERVAL_MS:-30000}
      - DB_PATH=/data/email-watcher/emails.db
      - WORKFLOW_DB_PATH=/data/email-watcher/workflow.db
      - WORKFLOW_POLL_MS=${WORKFLOW_POLL_MS:-2000}
      - STARTUP_DELAY_MS=${STARTUP_DELAY_MS:-15000}
      - MAX_NEW_PER_CYCLE=${MAX_NEW_PER_CYCLE:-5}
      - EMAIL_WATCHER_METRICS_PORT=${EMAIL_WATCHER_METRICS_PORT:-9465}
      # Email filtering (whitelist/blacklist by recipient address)
      - EMAIL_FILTER_INCLUDE=${EMAIL_FILTER_INCLUDE:-}
      - EMAIL_FILTER_EXCLUDE=${EMAIL_FILTER_EXCLUDE:-}
      # Business identifiers (for document-classifier owner field)
      - BUSINESS_COMPANY_NAME=${BUSINESS_COMPANY_NAME}
      - BUSINESS_TAX_IDS=${BUSINESS_TAX_IDS}
      - BUSINESS_CRN=${BUSINESS_CRN}
      - BUSINESS_LICENSE_PLATES=${BUSINESS_LICENSE_PLATES}
      # Paperless direct API (for large file uploads bypassing MCP)
      - PAPERLESS_URL=${PAPERLESS_URL}
      - PAPERLESS_API_TOKEN=${PAPERLESS_API_TOKEN}
      # PDF decryption (bank account statements)
      - BANK_PDF_PASSWORD=${BANK_PDF_PASSWORD:-}
      # gdrive-watcher channel
      - GDRIVE_POLL_INTERVAL_MS=${GDRIVE_POLL_INTERVAL_MS:-30000}
      - GDRIVE_LEVEL1=${GDRIVE_LEVEL1:-}
      - GDRIVE_LEVEL2=${GDRIVE_LEVEL2:-accounting,documents}
      - GDRIVE_MCP_URL=${GDRIVE_MCP_URL:-http://gmail-mcp:8000/mcp}
      - GDRIVE_WATCHER_METRICS_PORT=${GDRIVE_WATCHER_METRICS_PORT:-9466}

  paperless-mcp:
    image: ghcr.io/baruchiro/paperless-mcp:latest  # no semver tags; Watchtower excluded, auto_pull=false
    container_name: personal-assistant-paperless-mcp
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "false"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('net').createConnection(3000,'localhost').on('connect',function(){process.exit(0)}).on('error',function(){process.exit(1)})\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    environment:
      - PAPERLESS_URL=${PAPERLESS_URL}
      - PAPERLESS_API_KEY=${PAPERLESS_API_TOKEN}

  checker-mcp:
    image: personal-assistant-checker-mcp:latest
    build:
      context: ./checker-mcp
    container_name: personal-assistant-checker-mcp
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "false"
      caddy: ${CHECKER_DOMAIN:-invoices.lan}
      caddy.reverse_proxy: "{{upstreams 5000}}"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('localhost',8001),2); s.close()\" && python -c \"import socket; s=socket.create_connection(('localhost',5000),2); s.close()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    ports:
      - "8011:5000"
    environment:
      - PAPERLESS_URL=${PAPERLESS_URL}
      - PAPERLESS_API_TOKEN=${PAPERLESS_API_TOKEN}
      # Stateless HTTP: no session IDs, server restarts are transparent to Claude
      - FASTMCP_STATELESS_HTTP=true

  gmail-mcp:
    image: ghcr.io/taylorwilsdon/google_workspace_mcp:1.16.2  # pinned 2026-03, body_format support
    container_name: personal-assistant-gmail-mcp
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "false"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('localhost',8000),5); s.close()\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    volumes:
      # OAuth tokens persist here
      - ${PA_DATA_DIR:-/mnt/shared_configs/personal-assistant}/gmail:/app/store_creds
      - ${GMAIL_CLIENT_SECRET_FILE:-/dev/null}:/app/client_secret_mount.json:ro
    environment:
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET}
      - GOOGLE_OAUTH_REDIRECT_URI=${GOOGLE_OAUTH_REDIRECT_URI:-}
      - GOOGLE_MCP_CREDENTIALS_DIR=/app/store_creds
      - GOOGLE_CLIENT_SECRET_JSON=${GOOGLE_CLIENT_SECRET_JSON}
      # Attachment download URLs must use Docker service name, not localhost
      - WORKSPACE_EXTERNAL_URL=http://gmail-mcp:8000
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ -n "$$GOOGLE_CLIENT_SECRET_JSON" ]; then
          echo "$$GOOGLE_CLIENT_SECRET_JSON" > /app/client_secret.json
        elif [ -s /app/client_secret_mount.json ]; then
          cp /app/client_secret_mount.json /app/client_secret.json
        fi
        exec uv run main.py --transport streamable-http --permissions gmail:readonly drive:full

  gmail-mcp-auth:
    image: caddy:2-alpine
    container_name: personal-assistant-gmail-mcp-auth
    restart: unless-stopped
    depends_on:
      gmail-mcp:
        condition: service_healthy
    labels:
      com.centurylinklabs.watchtower.enable: "false"
      caddy: ${GMAIL_MCP_DOMAIN:-gmail-mcp.lan}
      caddy.reverse_proxy: "{{upstreams 8080}}"
    ports:
      - "8000:8080"
    environment:
      - GMAIL_MCP_TOKEN=${GMAIL_MCP_TOKEN}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        cat > /tmp/Caddyfile <<'EOF'
        :8080
        @mcp_no_auth {
            path /mcp*
            not header Authorization "Bearer {$$GMAIL_MCP_TOKEN}"
        }
        respond @mcp_no_auth "Unauthorized" 401
        reverse_proxy gmail-mcp:8000
        EOF
        exec caddy run --config /tmp/Caddyfile --adapter caddyfile

  outlook-mcp:
    image: personal-assistant-outlook-mcp:latest
    build:
      context: ./outlook-mcp
    container_name: personal-assistant-outlook-mcp
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "false"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',8002),2); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      # Token cache persists here — device code auth runs at startup if needed
      - ${PA_DATA_DIR:-/mnt/shared_configs/personal-assistant}/outlook:/data
    environment:
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID:-}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID:-consumers}
      - TOKEN_CACHE_PATH=/data/token_cache.json
      # Stateless HTTP: no session IDs, server restarts are transparent to Claude
      - FASTMCP_STATELESS_HTTP=true

  # ── Local-profile services ────────────────────────────────────
  # Usage: docker compose --profile local --env-file .env up --build

  # ── Local Paperless-ngx (for dev/testing) ──────────────────
  # After first start:
  #   1. docker compose exec paperless python3 manage.py createsuperuser
  #   2. Log into http://localhost:8010, go to Settings > API Tokens
  #   3. Put the token in .env as PAPERLESS_API_TOKEN=<token>
  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:2.20.3
    container_name: personal-assistant-paperless
    restart: unless-stopped
    profiles: ["local"]
    depends_on:
      - paperless-db
      - paperless-broker
    ports:
      - "8010:8000"
    volumes:
      - ${PA_DATA_DIR:-./data}/paperless/data:/usr/src/paperless/data
      - ${PA_DATA_DIR:-./data}/paperless/media:/usr/src/paperless/media
      - ${PA_DATA_DIR:-./data}/paperless/consume:/usr/src/paperless/consume
    environment:
      PAPERLESS_REDIS: redis://paperless-broker:6379
      PAPERLESS_DBHOST: paperless-db
      PAPERLESS_DBPASS: paperless
      USERMAP_UID: 0
      USERMAP_GID: 0
      PAPERLESS_TIME_ZONE: Europe/Bratislava
      PAPERLESS_URL: http://localhost:8010
      PAPERLESS_CONSUMER_POLLING: 10
      PAPERLESS_CONSUMER_RECURSIVE: true
      PAPERLESS_TASK_WORKERS: 2
      PAPERLESS_THREADS_PER_WORKER: 3
      PAPERLESS_CONSUMER_SUBDIRS_AS_TAGS: "true"

  paperless-db:
    image: docker.io/library/postgres:18
    container_name: personal-assistant-paperless-db
    restart: unless-stopped
    profiles: ["local"]
    volumes:
      - ${PA_DATA_DIR:-./data}/paperless/pgdata:/var/lib/postgresql
    environment:
      POSTGRES_DB: paperless
      POSTGRES_USER: paperless
      POSTGRES_PASSWORD: paperless

  paperless-broker:
    image: docker.io/library/redis:8
    container_name: personal-assistant-paperless-broker
    restart: unless-stopped
    profiles: ["local"]
    volumes:
      - ${PA_DATA_DIR:-./data}/paperless/redisdata:/data

  alloy:
    image: grafana/alloy:latest
    container_name: personal-assistant-alloy
    restart: unless-stopped
    profiles: ["local"]
    volumes:
      - ./observability/alloy-config.alloy:/etc/alloy/config.alloy:ro
    ports:
      - "12345:12345"   # Alloy UI
    environment:
      - PROMETHEUS_URL=http://prometheus:9090/api/v1/write
      - LOKI_URL=http://loki:3100/loki/api/v1/push
      - TEMPO_URL=http://tempo:3200
    command: >
      run
      --server.http.listen-addr=0.0.0.0:12345
      --stability.level=generally-available
      /etc/alloy/config.alloy

  prometheus:
    image: prom/prometheus:latest
    container_name: personal-assistant-prometheus
    restart: unless-stopped
    profiles: ["local"]
    ports:
      - "9091:9090"     # 9091 to avoid conflict with host prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-remote-write-receiver'
    volumes:
      - ./observability/prometheus-config.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  loki:
    image: grafana/loki:latest
    container_name: personal-assistant-loki
    restart: unless-stopped
    profiles: ["local"]
    user: "0"
    ports:
      - "3101:3100"     # 3101 to avoid conflict with host loki
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./observability/loki-config.yml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki

  tempo:
    image: grafana/tempo:2.7.2
    container_name: personal-assistant-tempo
    restart: unless-stopped
    profiles: ["local"]
    ports:
      - "3200:3200"      # Tempo query API
    command: -config.file=/etc/tempo/tempo.yml
    volumes:
      - ./observability/tempo-config.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo

  grafana:
    image: grafana/grafana:latest
    container_name: personal-assistant-grafana
    restart: unless-stopped
    profiles: ["local"]
    ports:
      - "3001:3000"     # 3001 to avoid conflict with host grafana
    environment:
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./observability/dashboards:/var/lib/grafana/dashboards:ro
      - ./observability/provisioning:/etc/grafana/provisioning:ro

volumes:
  prometheus-data:
  loki-data:
  tempo-data:
