services:
  claude-code:
    build:
      context: ./claude-code
      args:
        CLAUDE_CODE_VERSION: latest
    container_name: personal-assistant-claude
    restart: unless-stopped
    volumes:
      # Mount Claude config dir for OAuth credentials and channel state
      # Pre-authenticate on host first: claude login
      - claude-config:/root/.claude
    environment:
      - NODE_OPTIONS=--max-old-space-size=4096
    networks:
      - assistant
    # No ports exposed — Remote Control uses outbound HTTPS only

  mock-paperless-tool:
    build:
      context: ./mock-tool
    container_name: personal-assistant-mock-paperless
    restart: unless-stopped
    networks:
      - assistant
    # Port 8000 exposed only within Docker network (not to host)

volumes:
  claude-config:
    # Persist OAuth tokens and channel allowlists across restarts

networks:
  assistant:
    driver: bridge
