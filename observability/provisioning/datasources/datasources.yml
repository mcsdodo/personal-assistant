apiVersion: 1
deleteDatasources:
  - name: Loki
    orgId: 1
  - name: Prometheus
    orgId: 1
  - name: Tempo
    orgId: 1
datasources:
- name: Loki
  type: loki
  uid: pa-loki
  access: proxy
  orgId: 1
  url: http://loki:3100
  basicAuth: false
  isDefault: true
  version: 1
  editable: false
  jsonData:
    derivedFields:
      - name: trace_id
        matcherRegex: "trace_id=(\\w+)"
        url: "$${__value.raw}"
        datasourceUid: pa-tempo
        matcherType: regex
- name: Prometheus
  type: prometheus
  uid: pa-prometheus
  access: proxy
  orgId: 1
  url: http://prometheus:9090
  basicAuth: false
  isDefault: false
  version: 1
  editable: false
  jsonData:
    timeInterval: 10s
- name: Tempo
  type: tempo
  uid: pa-tempo
  access: proxy
  orgId: 1
  url: http://tempo:3200
  basicAuth: false
  isDefault: false
  version: 1
  editable: false
  jsonData:
    tracesToLogsV2:
      datasourceUid: pa-loki
      filterByTraceID: true
      filterBySpanID: true
    tracesToMetrics:
      datasourceUid: pa-prometheus
    serviceMap:
      datasourceUid: pa-prometheus
    nodeGraph:
      enabled: true
    lokiSearch:
      datasourceUid: pa-loki
