name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'checker-mcp/**'
      - 'claude-code/**'
      - 'outlook-mcp/**'
      - 'docker-compose.yml'
  pull_request:
    branches: [main]

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      checker-mcp: ${{ steps.filter.outputs.checker-mcp }}
      channels: ${{ steps.filter.outputs.channels }}
      claude-code: ${{ steps.filter.outputs.claude-code }}
      outlook-mcp: ${{ steps.filter.outputs.outlook-mcp }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            checker-mcp:
              - 'checker-mcp/**'
            channels:
              - 'claude-code/channels/**'
            claude-code:
              - 'claude-code/**'
            outlook-mcp:
              - 'outlook-mcp/**'

  test-checker-mcp:
    name: test checker-mcp
    needs: changes
    if: needs.changes.outputs.checker-mcp == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: checker-mcp
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: checker-mcp/requirements.txt
      - run: pip install -r requirements.txt pytest
      - run: python -m pytest test_matching.py -v

  test-channels:
    name: test channels
    needs: changes
    if: needs.changes.outputs.channels == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: claude-code/channels
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun test
        env:
          PAPERLESS_URL: http://paperless-mock

  build-claude-code:
    name: build claude-code
    needs: changes
    if: needs.changes.outputs.claude-code == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: docker build -t personal-assistant-claude-code:ci claude-code/

  build-checker-mcp:
    name: build checker-mcp
    needs: changes
    if: needs.changes.outputs.checker-mcp == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: docker build -t personal-assistant-checker-mcp:ci checker-mcp/

  build-outlook-mcp:
    name: build outlook-mcp
    needs: changes
    if: needs.changes.outputs.outlook-mcp == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: docker build -t personal-assistant-outlook-mcp:ci outlook-mcp/
