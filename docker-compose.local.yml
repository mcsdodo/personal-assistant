# Local dev observability stack for personal-assistant
# Usage: docker compose -f docker-compose.yml -f docker-compose.local.yml up
#
# Adds: Alloy (OTLP receiver) + Prometheus + Loki + Grafana
# Claude Code sends OTel metrics/logs → Alloy → Prometheus + Loki → Grafana

services:
  alloy:
    image: grafana/alloy:latest
    container_name: personal-assistant-alloy
    restart: unless-stopped
    volumes:
      - ./observability/alloy-config.alloy:/etc/alloy/config.alloy:ro
    ports:
      - "12345:12345"   # Alloy UI
    environment:
      - PROMETHEUS_URL=http://prometheus:9090/api/v1/write
      - LOKI_URL=http://loki:3100/loki/api/v1/push
    command: >
      run
      --server.http.listen-addr=0.0.0.0:12345
      --stability.level=generally-available
      /etc/alloy/config.alloy

  prometheus:
    image: prom/prometheus:latest
    container_name: personal-assistant-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"     # 9091 to avoid conflict with host prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-remote-write-receiver'
    volumes:
      - ./observability/prometheus-config.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  loki:
    image: grafana/loki:latest
    container_name: personal-assistant-loki
    restart: unless-stopped
    user: "0"
    ports:
      - "3101:3100"     # 3101 to avoid conflict with host loki
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./observability/loki-config.yml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki

  grafana:
    image: grafana/grafana:latest
    container_name: personal-assistant-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"     # 3001 to avoid conflict with host grafana
    environment:
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./observability/dashboards:/var/lib/grafana/dashboards:ro
      - ./observability/provisioning:/etc/grafana/provisioning:ro

volumes:
  prometheus-data:
  loki-data:
